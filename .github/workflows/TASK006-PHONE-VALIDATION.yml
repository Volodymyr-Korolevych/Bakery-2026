name: TASK006-PHONE-VALIDATION

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  task006_phone_validation:
    name: "TASK006 - account phone validation + checkout uses profile phone"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply TASK006 file replacements
        run: |
          mkdir -p pages

          cat << 'EOF' > pages/account.vue
          <template>
            <div class="max-w-5xl mx-auto px-4 py-8 space-y-8">
              <div v-if="!user" class="grid gap-8 md:grid-cols-2">
                <form class="space-y-4" @submit.prevent="login">
                  <h1 class="text-xl font-semibold">Вхід</h1>
                  <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Email</label>
                    <input
                      v-model="loginEmail"
                      type="email"
                      required
                      class="w-full rounded-xl border px-3 py-2 text-sm"
                    />
                  </div>
                  <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Пароль</label>
                    <input
                      v-model="loginPassword"
                      type="password"
                      required
                      class="w-full rounded-xl border px-3 py-2 text-sm"
                    />
                  </div>
                  <button
                    type="submit"
                    class="inline-flex items-center rounded-full bg-amber-500 px-5 py-2 text-sm font-medium text-white hover:bg-amber-600"
                  >
                    Увійти
                  </button>
                  <p v-if="authError" class="text-sm text-red-600 mt-2">{{ authError }}</p>
                </form>

                <form class="space-y-4" @submit.prevent="register">
                  <h2 class="text-xl font-semibold">Реєстрація</h2>
                  <div class="grid gap-3 md:grid-cols-2">
                    <div>
                      <label class="block text-xs font-medium text-slate-600 mb-1">Ім’я</label>
                      <input
                        v-model="firstName"
                        type="text"
                        required
                        class="w-full rounded-xl border px-3 py-2 text-sm"
                      />
                    </div>
                    <div>
                      <label class="block text-xs font-medium text-slate-600 mb-1">Прізвище</label>
                      <input
                        v-model="lastName"
                        type="text"
                        required
                        class="w-full rounded-xl border px-3 py-2 text-sm"
                      />
                    </div>
                  </div>
                  <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Email</label>
                    <input
                      v-model="regEmail"
                      type="email"
                      required
                      class="w-full rounded-xl border px-3 py-2 text-sm"
                    />
                  </div>
                  <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Пароль</label>
                    <input
                      v-model="regPassword"
                      type="password"
                      required
                      class="w-full rounded-xl border px-3 py-2 text-sm"
                    />
                  </div>
                  <button
                    type="submit"
                    class="inline-flex items-center rounded-full bg-slate-900 px-5 py-2 text-sm font-medium text-white hover:bg-slate-800"
                  >
                    Зареєструватися
                  </button>
                </form>
              </div>

              <div v-else class="space-y-8">
                <div class="flex items-center justify-between">
                  <div>
                    <h1 class="text-2xl font-semibold tracking-tight">Обліковий запис</h1>
                    <p class="text-sm text-slate-600">
                      {{ profile?.first_name }} {{ profile?.last_name }} ({{ user.email }})
                    </p>
                  </div>
                  <button
                    class="text-sm text-slate-600 hover:text-red-600"
                    @click="handleSignOut"
                  >
                    Вийти
                  </button>
                </div>

                <div class="grid gap-8 md:grid-cols-2 items-start">
                  <section class="space-y-4 rounded-2xl border bg-white p-4 shadow-sm text-sm">
                    <h2 class="text-base font-semibold">Профіль</h2>
                    <form class="space-y-3" @submit.prevent="saveProfile">
                      <div>
                        <label class="block text-xs font-medium text-slate-600 mb-1">Ім’я</label>
                        <input
                          v-model="profileFirstName"
                          type="text"
                          class="w-full rounded-xl border px-3 py-2 text-sm"
                        />
                      </div>
                      <div>
                        <label class="block text-xs font-medium text-slate-600 mb-1">Прізвище</label>
                        <input
                          v-model="profileLastName"
                          type="text"
                          class="w-full rounded-xl border px-3 py-2 text-sm"
                        />
                      </div>
                      <div>
                        <label class="block text-xs font-medium text-slate-600 mb-1">Телефон</label>
                        <input
                          v-model="profilePhone"
                          type="tel"
                          placeholder="+380XXXXXXXXX"
                          class="w-full rounded-xl border px-3 py-2 text-sm"
                        />
                        <p class="text-[11px] text-slate-400 mt-1">
                          Дозволені цифри, пробіли, дужки, дефіси та початковий знак +.
                        </p>
                      </div>

                      <p v-if="profileError" class="text-sm text-red-600">
                        {{ profileError }}
                      </p>

                      <button
                        type="submit"
                        class="inline-flex items-center rounded-full bg-amber-500 px-4 py-2 text-xs font-medium text-white hover:bg-amber-600"
                      >
                        Зберегти зміни
                      </button>
                    </form>
                  </section>

                  <section class="space-y-3 rounded-2xl border bg-white p-4 shadow-sm text-sm">
                    <h2 class="text-base font-semibold">Мої замовлення</h2>
                    <div v-if="!orders.length" class="text-sm text-slate-600">
                      Ви ще не робили замовлень.
                    </div>
                    <div v-else class="space-y-2">
                      <div
                        v-for="order in orders"
                        :key="order.id"
                        class="flex items-center justify-between rounded-xl border px-3 py-2"
                      >
                        <div>
                          <div class="font-medium">Замовлення №{{ order.id }}</div>
                          <div class="text-xs text-slate-500">
                            {{ new Date(order.created_at).toLocaleString() }}
                          </div>
                        </div>
                        <div class="text-right text-sm">
                          <div class="font-semibold text-amber-700">
                            ₴{{ order.total.toFixed(2) }}
                          </div>
                          <div class="text-xs text-slate-500">{{ order.phone }}</div>
                        </div>
                      </div>
                    </div>
                  </section>
                </div>
              </div>
            </div>
          </template>

          <script setup lang="ts">
          const { user, profile, loadUser, signIn, signUp, signOut, updateProfile, isUserAdmin } = useAuthUser()
          const { fetchMyOrders } = useOrders()

          const router = useRouter()

          const orders = ref<any[]>([])

          const loginEmail = ref('')
          const loginPassword = ref('')
          const regEmail = ref('')
          const regPassword = ref('')
          const firstName = ref('')
          const lastName = ref('')
          const authError = ref<string | null>(null)
          const profileError = ref<string | null>(null)

          const profileFirstName = ref('')
          const profileLastName = ref('')
          const profilePhone = ref('')

          const normalizePhone = (value: string) => {
            return value.replace(/[\s()-]/g, '')
          }

          const isValidPhone = (value: string) => {
            if (!value.trim()) return false
            const normalized = normalizePhone(value)
            return /^\+?[0-9]{10,15}$/.test(normalized)
          }

          const loadProfileAndOrders = async () => {
            if (!user.value) return

            if (profile.value) {
              profileFirstName.value = profile.value.first_name || ''
              profileLastName.value = profile.value.last_name || ''
              profilePhone.value = profile.value.phone || ''
            }
            orders.value = await fetchMyOrders()
          }

          const initAuthed = async () => {
            await loadUser()
            await loadProfileAndOrders()
          }

          const login = async () => {
            authError.value = null
            try {
              await signIn({ email: loginEmail.value, password: loginPassword.value })
              await loadUser()

              if (isUserAdmin.value) {
                await router.push('/admin')
                return
              }

              await loadProfileAndOrders()
            } catch (e: any) {
              authError.value = e.message || 'Помилка входу'
            }
          }

          const register = async () => {
            authError.value = null
            try {
              await signUp({
                email: regEmail.value,
                password: regPassword.value,
                firstName: firstName.value,
                lastName: lastName.value
              })
              await loadUser()

              if (isUserAdmin.value) {
                await router.push('/admin')
                return
              }

              await loadProfileAndOrders()
            } catch (e: any) {
              authError.value = e.message || 'Помилка реєстрації'
            }
          }

          const saveProfile = async () => {
            profileError.value = null

            if (!profile.value) return

            if (profilePhone.value.trim() && !isValidPhone(profilePhone.value)) {
              profileError.value = 'Введіть коректний номер телефону.'
              return
            }

            await updateProfile({
              id: profile.value.id,
              first_name: profileFirstName.value,
              last_name: profileLastName.value,
              phone: profilePhone.value.trim() ? normalizePhone(profilePhone.value) : '',
              created_at: profile.value.created_at
            })
            await loadProfileAndOrders()
          }

          const handleSignOut = async () => {
            await signOut()
            await router.push('/account')
          }

          onMounted(async () => {
            await initAuthed()
          })
          </script>
          EOF

          cat << 'EOF' > pages/checkout.vue
          <template>
            <div class="max-w-4xl mx-auto px-4 py-8 space-y-6">
              <h1 class="text-2xl font-semibold tracking-tight mb-4">Оформлення замовлення</h1>

              <div v-if="!cart.items.length" class="text-sm text-slate-600">
                Кошик порожній. Спочатку додайте товари.
              </div>

              <div v-else class="grid gap-6 md:grid-cols-[2fr,1fr] items-start">
                <form class="space-y-4" @submit.prevent="submit">
                  <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Телефон</label>
                    <div class="rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm">
                      {{ profilePhoneDisplay || 'Номер телефону не вказано' }}
                    </div>
                    <p class="mt-1 text-[11px] text-slate-500">
                      Змінити номер телефону можна в обліковому записі.
                    </p>
                  </div>

                  <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Пункт самовивозу</label>
                    <select
                      v-model="pickupLocationId"
                      class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-amber-500"
                    >
                      <option :value="null">Оберіть пункт</option>
                      <option
                        v-for="loc in pickupLocations"
                        :key="loc.id"
                        :value="loc.id"
                      >
                        {{ loc.name }} — {{ loc.address }}
                      </option>
                    </select>
                  </div>

                  <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Коментар до замовлення</label>
                    <textarea
                      v-model="notes"
                      rows="3"
                      class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-amber-500"
                    />
                  </div>

                  <p v-if="phoneError" class="text-sm text-red-600">
                    {{ phoneError }}
                  </p>

                  <button
                    type="submit"
                    class="inline-flex items-center rounded-full bg-amber-500 px-5 py-2 text-sm font-medium text-white hover:bg-amber-600 disabled:opacity-50 disabled:cursor-not-allowed"
                    :disabled="!canSubmit"
                  >
                    Підтвердити замовлення
                  </button>

                  <p v-if="error" class="text-sm text-red-600 mt-2">{{ error }}</p>
                  <p v-if="success" class="text-sm text-emerald-600 mt-2">Замовлення успішно створене.</p>
                </form>

                <div class="rounded-2xl border bg-white p-4 shadow-sm space-y-4 text-sm">
                  <div class="space-y-3">
                    <div
                      v-for="item in cart.items"
                      :key="item.product_id"
                      class="flex items-center gap-3"
                    >
                      <img
                        :src="getImage(item.image_url)"
                        :alt="item.name"
                        class="h-12 w-12 rounded-lg border object-cover bg-slate-100 shrink-0"
                      />

                      <div class="min-w-0 flex-1">
                        <div class="text-sm font-medium leading-tight">{{ item.name }}</div>
                        <div class="text-[11px] text-slate-500">
                          {{ item.qty }} × ₴{{ item.price.toFixed(2) }}
                          <span v-if="item.weight_grams"> · {{ item.weight_grams }} г</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="border-t pt-3 space-y-2">
                    <div class="flex justify-between">
                      <span>Кількість позицій</span>
                      <span>{{ cart.items.length }}</span>
                    </div>

                    <div class="flex justify-between">
                      <span>Сума замовлення</span>
                      <span class="font-semibold text-amber-700">₴{{ total.toFixed(2) }}</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </template>

          <script setup lang="ts">
          definePageMeta({
            middleware: 'auth'
          })

          const { cart, total } = useCart()
          const { placeOrder } = useOrders()
          const { isExternalUrl } = useStorageImages()
          const { profile, loadUser } = useAuthUser()
          const nuxtApp = useNuxtApp()

          type PickupLocation = {
            id: number
            name: string
            address: string
            work_hours: string | null
            is_active: boolean
          }

          const pickupLocationId = ref<number | null>(null)
          const notes = ref<string | null>(null)
          const pickupLocations = ref<PickupLocation[]>([])
          const error = ref<string | null>(null)
          const success = ref(false)
          const phoneError = ref<string | null>(null)

          const normalizePhone = (value: string) => {
            return value.replace(/[\s()-]/g, '')
          }

          const isValidPhone = (value: string) => {
            if (!value.trim()) return false
            const normalized = normalizePhone(value)
            return /^\+?[0-9]{10,15}$/.test(normalized)
          }

          const profilePhoneDisplay = computed(() => profile.value?.phone || '')

          const canSubmit = computed(() => {
            return !!profile.value?.phone && isValidPhone(profile.value.phone)
          })

          const getImage = (url: string | null) => {
            if (!url) return ''
            if (isExternalUrl(url)) return url
            return '/images/' + url
          }

          const loadPickupLocations = async () => {
            const { data, error: err } = await nuxtApp.$supabase
              .from('pickup_locations')
              .select('*')
              .eq('is_active', true)
              .order('id', { ascending: true })

            if (!err && data) {
              pickupLocations.value = data as PickupLocation[]
            }
          }

          const submit = async () => {
            error.value = null
            success.value = false
            phoneError.value = null

            const phone = profile.value?.phone || ''

            if (!phone) {
              phoneError.value = 'Вкажіть номер телефону в обліковому записі.'
              return
            }

            if (!isValidPhone(phone)) {
              phoneError.value = 'Номер телефону в обліковому записі некоректний.'
              return
            }

            try {
              await placeOrder({
                phone: normalizePhone(phone),
                pickupLocationId: pickupLocationId.value,
                notes: notes.value
              })
              success.value = true
            } catch (e: any) {
              error.value = e.message || 'Не вдалося створити замовлення.'
            }
          }

          onMounted(async () => {
            await loadUser()
            await loadPickupLocations()
          })
          </script>
          EOF

      - name: Commit and push TASK006 changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add pages/account.vue pages/checkout.vue
            git commit -m "TASK006: validate phone in account and use profile phone in checkout"
            git push
          else
            echo "No changes to commit."
          fi
