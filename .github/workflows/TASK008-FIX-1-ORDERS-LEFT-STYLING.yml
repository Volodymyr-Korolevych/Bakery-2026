name: TASK008-FIX-1-ORDERS-LEFT-STYLING

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  task008_fix_1_orders_left_styling:
    name: "TASK008-FIX-1 - style left orders list and active row"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace pages/admin/orders.vue
        run: |
          mkdir -p pages/admin

          cat << 'EOF' > pages/admin/orders.vue
          <template>
            <div class="max-w-6xl mx-auto px-4 py-8 grid md:grid-cols-[2fr,1.5fr] gap-6">

              <!-- LEFT -->
              <div class="space-y-3">
                <div
                  v-for="order in orders"
                  :key="order.id"
                  @click="selectOrder(order)"
                  class="rounded-2xl border p-4 cursor-pointer transition-all"
                  :class="selectedOrder?.id === order.id
                    ? 'border-amber-500 bg-amber-50 shadow-sm ring-1 ring-amber-200'
                    : 'border-slate-200 bg-white hover:bg-slate-50 hover:border-slate-300'"
                >
                  <div class="flex justify-between gap-3">
                    <div class="min-w-0 space-y-1">
                      <div class="font-semibold text-slate-900">№{{ order.id }}</div>

                      <div class="text-xs text-slate-500">
                        {{ formatDate(order.created_at) }}
                      </div>

                      <div class="text-xs text-slate-600 mt-1">
                        <span class="font-medium text-slate-700">Телефон:</span>
                        {{ order.phone || '—' }}
                      </div>

                      <div class="text-xs text-slate-600">
                        <span class="font-medium text-slate-700">Пекарня:</span>
                        {{ pickupNameById(order.pickup_location_id) }}
                      </div>
                    </div>

                    <div class="text-right shrink-0 flex flex-col items-end gap-2">
                      <div class="text-sm font-semibold text-amber-700">
                        ₴{{ Number(order.total).toFixed(2) }}
                      </div>

                      <div
                        class="text-xs px-2 py-0.5 rounded-full inline-block"
                        :class="statusColor(order.status)"
                      >
                        {{ statusLabel(order.status) }}
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- RIGHT -->
              <div v-if="selectedOrder" class="border rounded-xl p-4 space-y-4">
                <div class="flex justify-between items-center">
                  <div class="font-semibold">Замовлення №{{ selectedOrder.id }}</div>

                  <select
                    v-model="selectedStatus"
                    @change="updateStatus"
                    class="border rounded-lg px-2 py-1 text-sm"
                  >
                    <option value="new">Нове</option>
                    <option value="processing">В обробці</option>
                    <option value="done">Виконане</option>
                    <option value="cancelled">Скасоване</option>
                  </select>
                </div>

                <!-- ITEMS -->
                <div class="space-y-3">
                  <div
                    v-for="item in orderItems"
                    :key="item.id"
                    class="flex items-center gap-3"
                  >
                    <img
                      :src="getImage(item.product?.image_url)"
                      class="w-14 h-14 object-cover rounded-lg border"
                    />

                    <div class="flex-1">
                      <div class="text-sm font-medium">
                        {{ item.product?.name }}
                      </div>

                      <div class="text-xs text-slate-500">
                        {{ item.qty }} × ₴{{ item.price }}
                      </div>
                    </div>

                    <div class="text-sm font-semibold">
                      ₴{{ (item.qty * item.price).toFixed(2) }}
                    </div>
                  </div>
                </div>
              </div>

            </div>
          </template>

          <script setup lang="ts">
          const nuxtApp = useNuxtApp()
          const { isExternalUrl } = useStorageImages()

          const orders = ref([])
          const selectedOrder = ref(null)
          const orderItems = ref([])
          const selectedStatus = ref('new')

          type PickupLocation = {
            id: number
            name: string
          }
          const pickupLocations = ref<PickupLocation[]>([])

          const formatDate = (date: string) => {
            const d = new Date(date)
            return d.toLocaleDateString('uk-UA', {
              day: 'numeric',
              month: 'long'
            })
          }

          const statusLabel = (status: string) => {
            return {
              new: 'Нове',
              processing: 'В обробці',
              done: 'Виконане',
              cancelled: 'Скасоване'
            }[status] || status
          }

          const statusColor = (status: string) => {
            return {
              new: 'bg-blue-50 text-blue-700',
              processing: 'bg-amber-50 text-amber-700',
              done: 'bg-emerald-50 text-emerald-700',
              cancelled: 'bg-red-50 text-red-700'
            }[status] || ''
          }

          const loadPickupLocations = async () => {
            const { data, error } = await nuxtApp.$supabase
              .from('pickup_locations')
              .select('id, name')

            if (error) {
              console.error('loadPickupLocations', error)
              return
            }

            pickupLocations.value = data as PickupLocation[]
          }

          const pickupNameById = (id: number | null | undefined) => {
            if (!id) return '—'
            const loc = pickupLocations.value.find(l => l.id === id)
            return loc ? loc.name : '—'
          }

          const getImage = (url: string | null) => {
            if (!url) return ''
            if (isExternalUrl(url)) return url
            return '/images/' + url
          }

          const loadOrders = async () => {
            const { data } = await nuxtApp.$supabase
              .from('orders')
              .select('*')
              .order('created_at', { ascending: false })

            orders.value = data || []
          }

          const selectOrder = async (order) => {
            selectedOrder.value = order
            selectedStatus.value = order.status || 'new'

            const { data: items } = await nuxtApp.$supabase
              .from('order_items')
              .select('*')
              .eq('order_id', order.id)

            const ids = items.map(i => i.product_id)

            const { data: products } = await nuxtApp.$supabase
              .from('products')
              .select('*')
              .in('id', ids)

            const map = Object.fromEntries(products.map(p => [p.id, p]))

            orderItems.value = items.map(i => ({
              ...i,
              product: map[i.product_id]
            }))
          }

          const updateStatus = async () => {
            if (!selectedOrder.value) return

            await nuxtApp.$supabase
              .from('orders')
              .update({ status: selectedStatus.value })
              .eq('id', selectedOrder.value.id)

            selectedOrder.value.status = selectedStatus.value
          }

          onMounted(
            loadOrders(),
            loadPickupLocations()
          )
          </script>
          EOF

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add pages/admin/orders.vue
            git commit -m "TASK008-FIX-1: style left orders list and highlight active row"
            git push
          else
            echo "No changes to commit."
          fi
