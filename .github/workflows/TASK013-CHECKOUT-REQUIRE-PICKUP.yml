name: TASK013-CHECKOUT-REQUIRE-PICKUP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  task013_checkout_require_pickup:
    name: "TASK013 - require pickup location on checkout"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Replace pages/checkout.vue
        run: |
          mkdir -p pages

          cat << 'EOF' > pages/checkout.vue
          <template>
            <div class="max-w-4xl mx-auto px-4 py-8 space-y-6">
              <h1 class="text-2xl font-semibold tracking-tight mb-4">Оформлення замовлення</h1>

              <div v-if="!cart.items.length" class="text-sm text-slate-600">
                Кошик порожній. Спочатку додайте товари.
              </div>

              <div v-else class="grid gap-6 md:grid-cols-[2fr,1fr] items-start">
                <form class="space-y-4" @submit.prevent="submit">
                  <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Телефон</label>
                    <div class="rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm">
                      {{ profilePhoneDisplay || 'Номер телефону не вказано' }}
                    </div>
                    <p class="mt-1 text-[11px] text-slate-500">
                      Змінити номер телефону можна в обліковому записі.
                    </p>
                  </div>

                  <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Пункт самовивозу</label>
                    <select
                      v-model="pickupLocationId"
                      class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-amber-500"
                    >
                      <option :value="null">Оберіть пункт</option>
                      <option
                        v-for="loc in pickupLocations"
                        :key="loc.id"
                        :value="loc.id"
                      >
                        {{ loc.name }} — {{ loc.address }}
                      </option>
                    </select>

                    <p v-if="pickupError" class="mt-1 text-sm text-red-600">
                      {{ pickupError }}
                    </p>
                  </div>

                  <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Коментар до замовлення</label>
                    <textarea
                      v-model="notes"
                      rows="3"
                      class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-amber-500"
                    />
                  </div>

                  <p v-if="phoneError" class="text-sm text-red-600">
                    {{ phoneError }}
                  </p>

                  <button
                    type="submit"
                    class="inline-flex items-center rounded-full bg-amber-500 px-5 py-2 text-sm font-medium text-white hover:bg-amber-600 disabled:opacity-50 disabled:cursor-not-allowed"
                    :disabled="!canSubmit"
                  >
                    Підтвердити замовлення
                  </button>

                  <p v-if="error" class="text-sm text-red-600 mt-2">{{ error }}</p>
                </form>

                <div class="rounded-2xl border bg-white p-4 shadow-sm space-y-4 text-sm">
                  <div class="space-y-3">
                    <div
                      v-for="item in cart.items"
                      :key="item.product_id"
                      class="flex items-center gap-3"
                    >
                      <img
                        :src="getImage(item.image_url)"
                        :alt="item.name"
                        class="h-12 w-12 rounded-lg border object-cover bg-slate-100 shrink-0"
                      />

                      <div class="min-w-0 flex-1">
                        <div class="text-sm font-medium leading-tight">{{ item.name }}</div>
                        <div class="text-[11px] text-slate-500">
                          {{ item.qty }} × ₴{{ item.price.toFixed(2) }}
                          <span v-if="item.weight_grams"> · {{ item.weight_grams }} г</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="border-t pt-3 space-y-2">
                    <div class="flex justify-between">
                      <span>Кількість позицій</span>
                      <span>{{ cart.items.length }}</span>
                    </div>

                    <div class="flex justify-between">
                      <span>Сума замовлення</span>
                      <span class="font-semibold text-amber-700">₴{{ total.toFixed(2) }}</span>
                    </div>
                  </div>
                </div>
              </div>

              <!-- SUCCESS POPUP -->
              <div
                v-if="showSuccessPopup"
                class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-4"
              >
                <div class="max-w-lg w-full rounded-3xl bg-white p-8 shadow-2xl text-center space-y-4">
                  <div class="text-2xl font-semibold tracking-tight text-slate-900">
                    Ваше замовлення прийняте
                  </div>

                  <p class="text-base leading-7 text-slate-700">
                    Очікуйте підтвердження готовності замовлення в Особистому кабінеті
                  </p>
                </div>
              </div>
            </div>
          </template>

          <script setup lang="ts">
          definePageMeta({
            middleware: 'auth'
          })

          const { cart, total } = useCart()
          const { placeOrder } = useOrders()
          const { isExternalUrl } = useStorageImages()
          const { profile, loadUser } = useAuthUser()
          const nuxtApp = useNuxtApp()
          const router = useRouter()

          type PickupLocation = {
            id: number
            name: string
            address: string
            work_hours: string | null
            is_active: boolean
          }

          const pickupLocationId = ref<number | null>(null)
          const notes = ref<string | null>(null)
          const pickupLocations = ref<PickupLocation[]>([])
          const error = ref<string | null>(null)
          const phoneError = ref<string | null>(null)
          const pickupError = ref<string | null>(null)
          const showSuccessPopup = ref(false)
          let redirectTimer: ReturnType<typeof setTimeout> | null = null

          const normalizePhone = (value: string) => {
            return value.replace(/[\s()-]/g, '')
          }

          const isValidPhone = (value: string) => {
            if (!value.trim()) return false
            const normalized = normalizePhone(value)
            return /^\+?[0-9]{10,15}$/.test(normalized)
          }

          const profilePhoneDisplay = computed(() => profile.value?.phone || '')

          const canSubmit = computed(() => {
            return !!profile.value?.phone && isValidPhone(profile.value.phone) && pickupLocationId.value !== null
          })

          const getImage = (url: string | null) => {
            if (!url) return ''
            if (isExternalUrl(url)) return url
            return '/images/' + url
          }

          const loadPickupLocations = async () => {
            const { data, error: err } = await nuxtApp.$supabase
              .from('pickup_locations')
              .select('*')
              .eq('is_active', true)
              .order('id', { ascending: true })

            if (!err && data) {
              pickupLocations.value = data as PickupLocation[]
            }
          }

          const submit = async () => {
            error.value = null
            phoneError.value = null
            pickupError.value = null

            const phone = profile.value?.phone || ''

            if (!phone) {
              phoneError.value = 'Вкажіть номер телефону в обліковому записі.'
              return
            }

            if (!isValidPhone(phone)) {
              phoneError.value = 'Номер телефону в обліковому записі некоректний.'
              return
            }

            if (pickupLocationId.value === null) {
              pickupError.value = 'Оберіть пункт самовивозу.'
              return
            }

            try {
              await placeOrder({
                phone: normalizePhone(phone),
                pickupLocationId: pickupLocationId.value,
                notes: notes.value
              })

              showSuccessPopup.value = true

              if (redirectTimer) clearTimeout(redirectTimer)
              redirectTimer = setTimeout(async () => {
                showSuccessPopup.value = false
                await router.push('/')
              }, 5000)
            } catch (e: any) {
              error.value = e.message || 'Не вдалося створити замовлення.'
            }
          }

          onMounted(async () => {
            await loadUser()
            await loadPickupLocations()
          })

          onBeforeUnmount(() => {
            if (redirectTimer) clearTimeout(redirectTimer)
          })
          </script>
          EOF

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add pages/checkout.vue
            git commit -m "TASK013: require pickup location on checkout"
            git push
          else
            echo "No changes to commit."
          fi
